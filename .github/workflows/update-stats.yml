name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 02:17 UTC.
    - cron: "17 2 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-github-profile-stats
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&theme=transparent
          path: profile/stats.svg
          core_version: 2.1.3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=true&theme=transparent
          path: profile/top-langs.svg
          core_version: 2.1.3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/stats.svg profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "No statistics changes to commit."
            exit 0
          fi

          git commit -m "chore: update GitHub profile statistics"
          git push
