name: Update GitHub Profile Cards

on:
  workflow_dispatch:

  schedule:
    # 09:17 sáng ngày 1 mỗi tháng, giờ Việt Nam
    - cron: "17 9 1 * *"
      timezone: "Asia/Ho_Chi_Minh"

permissions:
  contents: write

concurrency:
  group: update-github-profile-cards
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate GitHub stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=ariesanhthu&show_icons=true&include_all_commits=true&rank_icon=default&custom_title=GitHub%20Activity&card_width=430&line_height=27&number_format=long&title_color=6EF7F1&text_color=C9D1D9&icon_color=6EF7F1&ring_color=6EF7F1&bg_color=0D1117&border_color=30363D&border_radius=12"
          path: profile/stats.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate top languages
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=ariesanhthu&layout=compact&langs_count=6&custom_title=Languages%20I%20Use&card_width=430&size_weight=0.5&count_weight=0.5&hide=Jupyter%20Notebook,Assembly,Pascal,Pawn&title_color=6EF7F1&text_color=C9D1D9&bg_color=0D1117&border_color=30363D&border_radius=12"
          path: profile/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit generated cards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/stats.svg profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "No profile card changes to commit."
            exit 0
          fi

          git commit -m "chore: update GitHub profile cards"
          git push