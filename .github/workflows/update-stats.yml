name: Update GitHub Languages

on:
  workflow_dispatch:

  schedule:
    - cron: "17 9 1 * *"
      timezone: "Asia/Ho_Chi_Minh"

permissions:
  contents: write

concurrency:
  group: update-github-profile-languages
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate top languages
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=ariesanhthu&layout=compact&langs_count=6&hide_border=true&theme=transparent
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated card
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "No language statistics changes to commit."
            exit 0
          fi

          git commit -m "chore: update GitHub language statistics"
          git push
